<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Leonard Fredershausen</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-hero {
      background: var(--hero-bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,99,235,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(99,102,241,0.12) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 4rem) 2rem 5rem;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .error-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .error-inner {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    .error-logo {
      display: inline-flex;
      color: rgba(248,250,252,0.4);
      margin-bottom: 2.5rem;
    }

    .error-number {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #60a5fa, #34d399);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite;
      margin-bottom: 0.5rem;
    }

    .error-subtitle {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--hero-text);
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .error-message {
      font-size: 0.9375rem;
      color: var(--hero-muted);
      line-height: 1.65;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

<!-- ── NAVIGATION ── -->
<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">
      <svg width="34" height="34" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="Leonard Fredershausen">
        <defs><clipPath id="nc"><circle cx="100" cy="100" r="95"/></clipPath></defs>
        <circle cx="100" cy="100" r="91" fill="none" stroke="currentColor" stroke-width="10"/>
        <g clip-path="url(#nc)" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="74,13 44,118 104,118"/>
          <line x1="118" y1="65" x2="85" y2="190"/>
          <line x1="118" y1="65" x2="184" y2="65"/>
          <line x1="104" y1="118" x2="148" y2="118"/>
        </g>
      </svg>
    </a>
    <ul>
      <li><button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button></li>
    </ul>
  </div>
</nav>

<!-- ── ERROR HERO ── -->
<section class="error-hero">
  <div class="error-inner">
    <div class="error-logo">
      <svg width="48" height="48" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs><clipPath id="ec"><circle cx="100" cy="100" r="95"/></clipPath></defs>
        <circle cx="100" cy="100" r="91" fill="none" stroke="currentColor" stroke-width="10"/>
        <g clip-path="url(#ec)" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="74,13 44,118 104,118"/>
          <line x1="118" y1="65" x2="85" y2="190"/>
          <line x1="118" y1="65" x2="184" y2="65"/>
          <line x1="104" y1="118" x2="148" y2="118"/>
        </g>
      </svg>
    </div>
    <p class="error-number">404</p>
    <p class="error-subtitle">Page not found</p>
    <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn btn-primary" href="index.html">Go home</a>
  </div>
</section>

<footer>
  <p>© 2026 Leonard Fredershausen · <a href="https://linkedin.com/in/leonardfredershausen/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:1px solid currentColor;opacity:0.6;">LinkedIn</a></p>
</footer>

<script>
  // Nav scroll state
  const nav = document.querySelector('nav');
  function updateNav() {
    nav.classList.toggle('scrolled', window.scrollY > 10);
  }
  window.addEventListener('scroll', updateNav, { passive: true });
  updateNav();

  // Dark mode toggle
  const themeToggle = document.getElementById('themeToggle');
  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  }
  const savedTheme = localStorage.getItem('theme');
  applyTheme(savedTheme === 'dark');
  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = !isDark;
    applyTheme(next);
    localStorage.setItem('theme', next ? 'dark' : 'light');
  });
</script>
</body>
</html>
